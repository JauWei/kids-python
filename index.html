<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小小 Python 程式設計師 · Kids Python Academy</title>
<link rel="icon" href="assets/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Inter:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="styles.css">
<style>
  :root { --font-mono: 'Fira Code', ui-monospace, SFMono-Regular, 'Menlo', 'Consolas', monospace; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel standalone -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<!-- Skulpt: in-browser Python interpreter (includes turtle) -->
<script src="https://cdn.jsdelivr.net/npm/skulpt@latest/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@latest/dist/skulpt-stdlib.js"></script>

<!-- CodeMirror 5: syntax-highlighted code editor -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

<script type="text/babel" src="characters.jsx"></script>
<script type="text/babel" src="playground.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="lessons.jsx"></script>
<script type="text/babel" src="lessons2.jsx"></script>
<script type="text/babel" src="lessons3.jsx"></script>
<script type="text/babel" src="lessons4.jsx"></script>

<script type="text/babel">
const CHAPTERS = [
  { id: "home", num: "",   emoji: "🏠", t: "首頁",            en: "Home" },
  { id: "ch1",  num: "01", emoji: "💬", t: "讓電腦說話",      en: "print()" },
  { id: "ch2",  num: "02", emoji: "📦", t: "變數收納盒",      en: "Variables" },
  { id: "ch3",  num: "03", emoji: "🏷️", t: "資料型別",       en: "Data Types" },
  { id: "ch4",  num: "04", emoji: "🧮", t: "數字運算",        en: "Math" },
  { id: "ch5",  num: "05", emoji: "🔤", t: "字串魔法",        en: "Strings" },
  { id: "ch6",  num: "06", emoji: "⌨️", t: "問使用者",       en: "input()" },
  { id: "ch7",  num: "07", emoji: "🤔", t: "做決定",          en: "If / Else" },
  { id: "ch8",  num: "08", emoji: "🔀", t: "邏輯運算",        en: "and / or / not" },
  { id: "ch9",  num: "09", emoji: "🔁", t: "for 與 range",    en: "For Loop" },
  { id: "ch10", num: "10", emoji: "♾️", t: "while 迴圈",     en: "While Loop" },
  { id: "ch11", num: "11", emoji: "📋", t: "串列 list",       en: "List" },
  { id: "ch12", num: "12", emoji: "📓", t: "字典 dict",       en: "Dict" },
  { id: "ch13", num: "13", emoji: "🛠️", t: "函式",           en: "Functions" },
  { id: "ch14", num: "14", emoji: "🛡️", t: "錯誤處理",       en: "Try / Except" },
  { id: "ch15", num: "15", emoji: "🧰", t: "模組",            en: "Modules" },
  { id: "ch16", num: "16", emoji: "🐢", t: "海龜畫圖",        en: "Turtle" },
  { id: "ch17", num: "17", emoji: "🧬", t: "物件導向",        en: "Classes" },
  { id: "ch18", num: "18", emoji: "📁", t: "檔案 I/O",        en: "Files" },
  { id: "ch19", num: "19", emoji: "🎯", t: "整合:猜數字遊戲", en: "Guess Game" },
  { id: "ch20", num: "20", emoji: "🎮", t: "設計你的遊戲",    en: "Your Game" },
  { id: "ch21", num: "21", emoji: "🗺️", t: "文字冒險",        en: "Text Adventure" },
  { id: "ch22", num: "22", emoji: "🧮", t: "心算練習機",      en: "Math Trainer" },
];

const PAGES = {
  home: () => null,
  ch1: Ch1, ch2: Ch2, ch3: Ch3, ch4: Ch4, ch5: Ch5,
  ch6: Ch6, ch7: Ch7, ch8: Ch8, ch9: Ch9, ch10: Ch10,
  ch11: Ch11, ch12: Ch12, ch13: Ch13, ch14: Ch14, ch15: Ch15, ch16: Ch16,
  ch17: Ch17, ch18: Ch18, ch19: Ch19, ch20: Ch20,
  ch21: Ch21, ch22: Ch22,
};

function App() {
  const [current, setCurrent] = React.useState(() => {
    const h = (window.location.hash || "#home").replace("#", "");
    return PAGES[h] !== undefined ? h : "home";
  });
  const [visited, setVisited] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("pyu_visited") || "[]"); } catch { return []; }
  });
  const contentRef = React.useRef(null);

  const go = (id) => {
    setCurrent(id);
    window.location.hash = id;
    if (!visited.includes(id)) {
      const nv = [...visited, id];
      setVisited(nv);
      localStorage.setItem("pyu_visited", JSON.stringify(nv));
    }
    if (contentRef.current) contentRef.current.scrollTop = 0;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  React.useEffect(() => {
    const onHash = () => {
      const h = (window.location.hash || "#home").replace("#", "");
      if (PAGES[h] !== undefined) setCurrent(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const idx = CHAPTERS.findIndex(c => c.id === current);
  const prev = idx > 0 ? CHAPTERS[idx - 1] : null;
  const next = idx < CHAPTERS.length - 1 ? CHAPTERS[idx + 1] : null;
  const totalChapters = CHAPTERS.length - 1;
  const visitedCount = visited.filter(v => v !== "home").length;
  const progress = (visitedCount / totalChapters) * 100;

  const PageComp = PAGES[current];

  return (
    <>
    <ChatPyu/>
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-brand" onClick={() => go("home")}>
          <div className="sidebar-brand-mark">🦉</div>
          <div className="sidebar-brand-text">
            <div className="sidebar-brand-title">小小 Python</div>
            <div className="sidebar-brand-sub">Kids Python Academy</div>
          </div>
        </div>

        <div className="sidebar-section-label">課程 · Lessons</div>

        {CHAPTERS.map(c => (
          <button key={c.id}
            className={`toc-item ${current === c.id ? "active" : ""}`}
            onClick={() => go(c.id)}>
            <span className="toc-num">{c.num || "🏠"}</span>
            <span className="toc-emoji">{c.emoji}</span>
            <span style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>{c.t}</div>
              <div style={{ fontSize: 10, color: "var(--fg-3)", fontStyle: "italic", fontFamily: "var(--font-latin)" }}>{c.en}</div>
            </span>
            {visited.includes(c.id) && c.id !== "home" && <span style={{ color: "#22c55e", fontSize: 12 }}>✓</span>}
          </button>
        ))}

        <div className="sidebar-section-label" style={{ marginTop: 8 }}>外篇 · Extras</div>
        <a className="toc-item" href="computer-components.html" style={{ textDecoration: "none" }}>
          <span className="toc-num">🖥️</span>
          <span className="toc-emoji">🔬</span>
          <span style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>認識電腦組成</div>
            <div style={{ fontSize: 10, color: "var(--fg-3)", fontStyle: "italic", fontFamily: "var(--font-latin)" }}>Hardware Lab</div>
          </span>
        </a>
        <a className="toc-item" href="cheat-sheet.html" style={{ textDecoration: "none" }}>
          <span className="toc-num">📑</span>
          <span className="toc-emoji">⚡</span>
          <span style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.2 }}>Python 速查表</div>
            <div style={{ fontSize: 10, color: "var(--fg-3)", fontStyle: "italic", fontFamily: "var(--font-latin)" }}>Cheat Sheet</div>
          </span>
        </a>

        <div className="sidebar-progress">
          <div className="sidebar-progress-label">
            <span>🏆 學習進度</span>
            <span>{visitedCount}/{totalChapters}</span>
          </div>
          <div className="sidebar-progress-bar">
            <div className="sidebar-progress-fill" style={{ width: `${progress}%` }}></div>
          </div>
          <div style={{ fontSize: 10, color: "var(--fg-3)", marginTop: 6 }}>
            {progress === 100 ? "🎉 全部完成！" : "繼續加油～"}
          </div>
        </div>
      </aside>

      <main className="content" ref={contentRef}>
        {current === "home" ? (
          <Home go={go}/>
        ) : (
          <div key={current} className="animate-fadeup">
            <PageComp/>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32, gap: 12, flexWrap: "wrap" }}>
              {prev ? (
                <button className="btn btn-ghost" onClick={() => go(prev.id)} style={{ flex: 1, minWidth: 200 }}>
                  ← {prev.emoji} {prev.t}
                </button>
              ) : <div style={{ flex: 1 }}></div>}
              {next ? (
                <button className="btn btn-primary" onClick={() => go(next.id)} style={{ flex: 1, minWidth: 200, justifyContent: "flex-end" }}>
                  {next.emoji} {next.t} →
                </button>
              ) : (
                <button className="btn btn-primary" onClick={() => go("home")} style={{ flex: 1, minWidth: 200, justifyContent: "flex-end" }}>
                  🏠 回到首頁
                </button>
              )}
            </div>
          </div>
        )}
      </main>
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
